server.port=8081
spring.application.name=order-inventory-service
ibm.mq.queueManager=QM1
ibm.mq.channel=DEV.APP.SVRCONN
ibm.mq.connName=localhost(1414)
ibm.mq.user=${MQ_USER:app}
ibm.mq.password=${MQ_PASSWORD:passw0rd}
app.mq.order-queue=DEV.QUEUE.1

#app.mq.payment-queue=DEV.PAYMENT.Q

app.mq.dead-letter-queue=DEV.DEAD.LETTER.QUEUE
app.mq.concurrency=1-3
app.payment.url=http://localhost:8082
spring.datasource.url=jdbc:postgresql://localhost:5432/inventory_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.com.order.inventory=DEBUG
resilience4j.circuitbreaker.instances.paymentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.paymentService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.paymentService.sliding-window-size=5
resilience4j.circuitbreaker.instances.paymentService.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.paymentService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.paymentService.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.retry.instances.paymentRetry.max-attempts=3
resilience4j.retry.instances.paymentRetry.wait-duration=2s