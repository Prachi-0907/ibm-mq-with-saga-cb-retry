server.port=8082
spring.application.name=order-payment-service

# IBM MQ
ibm.mq.queueManager=QM1
ibm.mq.channel=DEV.APP.SVRCONN
ibm.mq.connName=localhost(1414)
ibm.mq.user=${MQ_USER:app}
ibm.mq.password=${MQ_PASSWORD:passw0rd}

app.mq.concurrency=1-3

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/payment_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Notification Service URL
app.notification.url=http://localhost:8083

# Circuit Breaker
resilience4j.circuitbreaker.instances.notificationService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notificationService.minimum-number-of-calls=3
resilience4j.circuitbreaker.instances.notificationService.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificationService.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.notificationService.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.notificationService.automatic-transition-from-open-to-half-open-enabled=true

# Retry
resilience4j.retry.instances.notificationRetry.max-attempts=3
resilience4j.retry.instances.notificationRetry.wait-duration=2s